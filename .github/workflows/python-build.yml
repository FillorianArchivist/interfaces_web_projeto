name: Jamstack XML to JSON Pipeline

# 1. O GATILHO (Quando é que este script corre?)
on:
  push:
    branches:
      - main
    paths:
      - 'backend/xml_raw/**/*.xml'
      - 'backend/schema.dtd'
      - 'backend/pipeline.py'
  workflow_dispatch: # Esta linha permite iniciar o workflow manualmente no GitHub!

permissions:
  contents: write

# Variável de ambiente adicionada para resolver o aviso de depreciação do Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 2. AS INSTRUÇÕES
jobs:
  validate-and-build:
    runs-on: ubuntu-latest 

    steps:
      # A. Obter o código
      - name: Checkout repository
        uses: actions/checkout@v4

      # B. Instalar o Python (Atualizado para a v5 para evitar o aviso do Node)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # C. Instalar as bibliotecas
      - name: Install dependencies
        run: pip install lxml xmltodict

      # D. PASSO EXTRA: Depuração (Mostra que pastas existem no repositório)
      - name: Debug Folder Structure
        run: |
          echo "Conteúdo da pasta principal:"
          ls -la
          echo "Conteúdo da pasta backend (se existir):"
          ls -la backend/ || echo "ERRO: A pasta backend não existe no repositório!"

      # E. Correr o nosso motor de dados
      - name: Run Python build script
        run: python backend/pipeline.py

      # F. Guardar os resultados na NOVA pasta do Frontend
      - name: Commit and push generated files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add frontend/public/data/manuscritos.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-build: Validado e atualizado o JSON (Jamstack)"
          git push
